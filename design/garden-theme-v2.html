<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=800, initial-scale=1.0">
<title>🐣 快乐背单词 — 花园童话</title>
<style>
/* ====== Design System: Garden Fairy Tale v2 ====== */
:root {
  --mint: #66bb6a;
  --mint-light: #a5d6a7;
  --mint-pale: #c8e6c9;
  --blush: #f48fb1;
  --blush-light: #f8bbd0;
  --sunshine: #fff176;
  --sunshine-light: #fff9c4;
  --cream: #fffde7;
  --brown: #8d6e63;
  --brown-text: #5d4037;
  --white-card: #fffff9;
  --shadow-card: 0 8px 40px rgba(102, 187, 106, 0.15), 0 2px 8px rgba(0,0,0,0.06);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-xl: 56px;
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px; height: 800px; overflow: hidden;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #e8f8e0 0%, #d4edc9 28%, #c8e6c9 55%, #a5d6a7 100%);
  display: flex; align-items: center; justify-content: center;
  user-select: none; position: relative;
}

/* ====== 花园背景 ====== */
.garden-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

.cloud {
  position: absolute; background: white; border-radius: 50%; opacity: 0.65;
  animation: cloud-drift 28s linear infinite;
}
.cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
.cloud-1 { width: 150px; height: 54px; top: 35px; left: 6%; border-radius: 54px; }
.cloud-1::before { width: 65px; height: 65px; top: -32px; left: 28px; }
.cloud-1::after  { width: 85px; height: 85px; top: -42px; left: 60px; }
.cloud-2 { width: 100px; height: 34px; top: 22px; left: 74%; border-radius: 34px; animation-delay: -14s; }
.cloud-2::before { width: 44px; height: 44px; top: -21px; left: 16px; }
.cloud-2::after  { width: 56px; height: 56px; top: -28px; left: 40px; }
@keyframes cloud-drift { 0% { transform: translateX(0); } 100% { transform: translateX(36px); } }

.sun {
  position: absolute; width: 80px; height: 80px; top: 28px; right: 10%;
  background: radial-gradient(circle, #fff9c4 0%, #fff176 40%, #ffee58 100%);
  border-radius: 50%;
  box-shadow: 0 0 50px rgba(255,241,118,0.5), 0 0 100px rgba(255,241,118,0.2);
  animation: sun-glow 4s ease-in-out infinite;
}
@keyframes sun-glow {
  0%,100% { box-shadow: 0 0 50px rgba(255,241,118,0.5),0 0 100px rgba(255,241,118,0.2); }
  50% { box-shadow: 0 0 70px rgba(255,241,118,0.7),0 0 140px rgba(255,241,118,0.35); }
}

.grass-ground {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 70px;
  background: linear-gradient(180deg, #81c784 0%, #66bb6a 50%, #4caf50 100%);
  border-radius: 50% 50% 0 0 / 28px 28px 0 0;
}

/* ====== 主卡片 ====== */
.main-card {
  position: relative; z-index: 2;
  width: 680px;
  background: var(--white-card);
  border-radius: 44px;
  padding: 32px 44px 28px;
  box-shadow: var(--shadow-card);
  text-align: center;
  border: 3px solid var(--mint-pale);
}

/* 卡片顶部花环 */
.card-garland {
  position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 3px;
}
.garland-flower {
  width: 22px; height: 22px; border-radius: 50%;
  animation: garland-bounce 2s ease-in-out infinite;
}
.garland-flower:nth-child(1) { background:#f48fb1; animation-delay:0s; }
.garland-flower:nth-child(2) { background:#fff176; animation-delay:0.2s; }
.garland-flower:nth-child(3) { background:#81c784; animation-delay:0.4s; }
.garland-flower:nth-child(4) { background:#90caf9; animation-delay:0.6s; }
.garland-flower:nth-child(5) { background:#ce93d8; animation-delay:0.8s; }
.garland-flower:nth-child(6) { background:#ffab91; animation-delay:1.0s; }
.garland-flower:nth-child(7) { background:#f48fb1; animation-delay:1.2s; }
@keyframes garland-bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }

/* 卡片底部小草 */
.card-grass {
  position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; pointer-events: none;
}
.grass-blade { width: 3px; background: #a5d6a7; border-radius: 50% 50% 0 0; animation: grass-sway 3s ease-in-out infinite; }
.grass-blade:nth-child(1) { height:22px; }
.grass-blade:nth-child(2) { height:28px; animation-delay:0.3s; }
.grass-blade:nth-child(3) { height:18px; animation-delay:0.6s; }
.grass-blade:nth-child(4) { height:25px; animation-delay:0.9s; }
.grass-blade:nth-child(5) { height:20px; animation-delay:1.2s; }
@keyframes grass-sway { 0%,100% { transform:rotate(-4deg); } 50% { transform:rotate(4deg); } }

/* ====== 顶部栏 ====== */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.score-badge {
  font-size: 18px; font-weight: 700; color: var(--brown-text);
  background: var(--cream); padding: 6px 18px;
  border-radius: 28px; border: 2px solid var(--sunshine-light);
}
.streak-badge {
  font-size: 17px; font-weight: 700; color: #e65100;
  background: #fff3e0; padding: 6px 16px;
  border-radius: 28px; border: 2px solid #ffe0b2;
}
.progress-dots {
  display: flex; gap: 6px; align-items: center;
}
.dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #e0e0e0; transition: all 0.4s ease;
}
.dot.done { background: #66bb6a; }
.dot.current { background: #fff176; box-shadow: 0 0 12px rgba(255,241,118,0.6); }

/* ====== 标题 ====== */
.title-area { margin-bottom: 4px; }
.app-icon { font-size: 42px; display: inline-block; animation: chick-bounce 2s ease-in-out infinite; }
@keyframes chick-bounce { 0%,100% { transform:translateY(0); } 30% { transform:translateY(-8px); } 50% { transform:translateY(0); } 70% { transform:translateY(-4px); } }
.title { font-size: 26px; font-weight: 800; color: var(--mint); letter-spacing: 3px; }

/* ====== 中文翻译 — 大而清晰 ====== */
.chinese-area {
  margin: 8px 0 12px;
}
.chinese-badge {
  display: inline-block;
  font-size: 26px;
  font-weight: 800;
  color: #5d4037;
  background: linear-gradient(135deg, #fffde7, #fff9c4);
  padding: 8px 32px;
  border-radius: 32px;
  border: 3px solid #fff176;
  box-shadow: 0 3px 12px rgba(255,241,118,0.3);
}

/* ====== 单词展示 — 加大 ====== */
.word-display {
  display: flex; justify-content: center; align-items: center;
  gap: 12px; margin: 12px 0 16px; flex-wrap: wrap;
}
.letter-box {
  width: 90px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  font-size: 60px; font-weight: 800;
  border-radius: 24px;
  transition: all 0.3s var(--ease-bounce);
  position: relative;
}
.letter-shown {
  background: linear-gradient(180deg, #fffde7 0%, #fff9c4 100%);
  color: #5d4037;
  box-shadow: 0 6px 24px rgba(102,187,106,0.3);
  border: 3px solid #fff176;
}
.letter-blank {
  background: #f5f5f5;
  border: 3px dashed #a5d6a7;
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.05);
  animation: pulse-blank 2.5s ease-in-out infinite;
  cursor: pointer;
}
.letter-blank::after {
  content: '?';
  font-size: 44px; color: #c8e6c9; font-weight: 400;
}
.letter-blank.active {
  border-color: #ff7043;
  border-style: solid;
  box-shadow: 0 0 24px rgba(255,112,67,0.45);
  animation: none;
}
@keyframes pulse-blank { 0%,100% { border-color: #a5d6a7; } 50% { border-color: #66bb6a; } }

.letter-blank.filled {
  background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
  border: 3px solid #66bb6a;
  animation: none;
  color: #2e7d32;
  font-size: 60px;
  font-weight: 800;
}
.letter-blank.filled::after { content: ''; }
.letter-blank.filled.correct-fill { box-shadow: 0 6px 20px rgba(102,187,106,0.5); }
.letter-blank.filled.wrong-fill { border-color: #e53935; background: linear-gradient(180deg, #ffebee 0%, #ffcdd2 100%); color: #c62828; }

/* ====== 字母选项按钮 — 选择区 ====== */
.options-area {
  margin: 8px 0 4px;
}
.options-label {
  font-size: 14px; color: #a5d6a7; margin-bottom: 8px;
}
.options-row {
  display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;
}
.option-btn {
  width: 70px; height: 70px;
  font-size: 36px; font-weight: 800;
  border: 3px solid #c8e6c9;
  border-radius: 20px;
  cursor: pointer;
  background: white;
  color: #5d4037;
  transition: all 0.2s var(--ease-bounce);
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', 'PingFang SC', sans-serif;
}
.option-btn:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(102,187,106,0.25);
  border-color: var(--mint);
  background: #f1f8e9;
}
.option-btn:active { transform: scale(0.9); }
.option-btn.used {
  opacity: 0.3; pointer-events: none; transform: scale(0.85);
  border-color: #e0e0e0;
}

/* ====== 控制按钮 ====== */
.controls-row {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 12px;
}
.btn {
  height: 52px; padding: 0 26px;
  font-size: 18px; font-weight: 700;
  border: none; border-radius: 32px;
  cursor: pointer; outline: none;
  transition: all 0.2s var(--ease-bounce);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.btn:active { transform: scale(0.94); }
.btn-hint {
  background: linear-gradient(135deg, #f48fb1, #ec407a);
  color: white;
  box-shadow: 0 4px 16px rgba(244,143,177,0.35);
}
.btn-hint:hover { box-shadow: 0 6px 24px rgba(244,143,177,0.5); transform: translateY(-2px); }
.btn-check {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: white;
  box-shadow: 0 4px 16px rgba(102,187,106,0.35);
}
.btn-check:hover { box-shadow: 0 6px 24px rgba(102,187,106,0.5); transform: translateY(-2px); }
.btn-check:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-clear {
  background: white; color: #8d6e63;
  border: 2px solid #e0e0e0;
}
.btn-clear:hover { border-color: #a5d6a7; }
.btn-next {
  background: linear-gradient(135deg, #ffab91, #ff7043);
  color: white;
  box-shadow: 0 4px 16px rgba(255,171,145,0.35);
}
.btn-next:hover { box-shadow: 0 6px 24px rgba(255,171,145,0.5); transform: translateY(-2px); }

/* ====== 反馈 ====== */
.feedback {
  margin-top: 8px; min-height: 36px;
  font-size: 20px; font-weight: 700;
}
.feedback.correct { color: #43a047; }
.feedback.wrong { color: #e53935; animation: shake 0.5s ease; }
@keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-8px); } 75% { transform:translateX(8px); } }

/* ====== 撒花 ====== */
.confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
.petal-piece {
  position: absolute; border-radius: 50% 0 50% 0;
  animation: petal-fall 2s ease-out forwards;
}
@keyframes petal-fall {
  0%   { transform: translateY(-60px) rotate(0deg) scale(0.5); opacity:1; }
  100% { transform: translateY(850px) rotate(400deg) scale(0.3); opacity:0; }
}
.score-popup {
  position: fixed; z-index: 21; pointer-events: none;
  font-size: 48px; font-weight: 800; color: #43a047;
  animation: pop-up 1s ease-out forwards;
  text-shadow: 0 2px 8px rgba(67,160,71,0.3);
}
@keyframes pop-up { 0% { transform:translateY(0) scale(0.3); opacity:1; } 100% { transform:translateY(-150px) scale(1.5); opacity:0; } }
</style>
</head>
<body>

<!-- 花园背景 -->
<div class="garden-layer">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="sun"></div>
  <div class="grass-ground"></div>
</div>

<!-- 主卡片 -->
<div class="main-card">
  <div class="card-garland">
    <div class="garland-flower"></div><div class="garland-flower"></div>
    <div class="garland-flower"></div><div class="garland-flower"></div>
    <div class="garland-flower"></div><div class="garland-flower"></div>
    <div class="garland-flower"></div>
  </div>
  <div class="card-grass">
    <div class="grass-blade"></div><div class="grass-blade"></div>
    <div class="grass-blade"></div><div class="grass-blade"></div>
    <div class="grass-blade"></div>
  </div>

  <!-- 顶部状态栏 -->
  <div class="top-bar">
    <div class="score-badge">⭐ 得分 <span id="score">0</span></div>
    <div class="progress-dots" id="progress-dots"></div>
    <div class="streak-badge" style="display:none" id="streak-badge">🔥 连对 <span id="streak">0</span></div>
  </div>

  <!-- 标题 -->
  <div class="title-area">
    <span class="app-icon">🐣</span>
    <span class="title">快乐背单词</span>
  </div>

  <!-- 中文翻译 — 大而清晰 -->
  <div class="chinese-area">
    <div class="chinese-badge" id="chinese-badge">🐶 狗</div>
  </div>

  <!-- 单词字母展示 -->
  <div class="word-display" id="word-display"></div>

  <!-- 反馈 -->
  <div class="feedback" id="feedback"></div>

  <!-- 字母选项 -->
  <div class="options-area">
    <div class="options-label">👇 点击下方字母填入空白处</div>
    <div class="options-row" id="options-row"></div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls-row">
    <button class="btn btn-clear" onclick="clearBlanks()">🔄 清空</button>
    <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
    <button class="btn btn-check" id="btn-check" onclick="checkAnswer()" disabled>✅ 检查</button>
  </div>
</div>

<script>
// ====== 单词库 ======
const wordBank = [
  { word: 'apple', chinese: '苹果' },
  { word: 'banana', chinese: '香蕉' },
  { word: 'cat', chinese: '猫' },
  { word: 'dog', chinese: '狗' },
  { word: 'elephant', chinese: '大象' },
  { word: 'fish', chinese: '鱼' },
  { word: 'grape', chinese: '葡萄' },
  { word: 'happy', chinese: '开心的' },
  { word: 'island', chinese: '岛屿' },
  { word: 'jump', chinese: '跳' },
  { word: 'king', chinese: '国王' },
  { word: 'lion', chinese: '狮子' },
  { word: 'monkey', chinese: '猴子' },
  { word: 'night', chinese: '夜晚' },
  { word: 'orange', chinese: '橙子' },
  { word: 'panda', chinese: '熊猫' },
  { word: 'queen', chinese: '女王' },
  { word: 'rabbit', chinese: '兔子' },
  { word: 'school', chinese: '学校' },
  { word: 'tiger', chinese: '老虎' },
  { word: 'umbrella', chinese: '雨伞' },
  { word: 'voice', chinese: '声音' },
  { word: 'water', chinese: '水' },
  { word: 'yellow', chinese: '黄色' },
  { word: 'zebra', chinese: '斑马' },
  { word: 'book', chinese: '书' },
  { word: 'cake', chinese: '蛋糕' },
  { word: 'door', chinese: '门' },
  { word: 'egg', chinese: '鸡蛋' },
  { word: 'flower', chinese: '花' },
  { word: 'garden', chinese: '花园' },
  { word: 'house', chinese: '房子' },
  { word: 'milk', chinese: '牛奶' },
  { word: 'noodle', chinese: '面条' },
  { word: 'pencil', chinese: '铅笔' },
  { word: 'robot', chinese: '机器人' },
  { word: 'sun', chinese: '太阳' },
  { word: 'tree', chinese: '树' },
  { word: 'moon', chinese: '月亮' },
  { word: 'star', chinese: '星星' },
];

// ====== 状态 ======
let currentWord = null;
let score = 0;
let streak = 0;
let wordsDone = 0;
let totalQuestions = 10;
let hintUsed = false;
let usedWords = [];
let blankPositions = [];       // 挖空的字母位置
let blankValues = [];          // 每个空位已填入的字母（null=未填）
let nextBlankIdx = 0;          // 下一个待填的空位索引
let optionLetters = [];        // 当前选项字母数组
let answered = false;

// ====== 随机选词 ======
function pickWord() {
  if (usedWords.length >= wordBank.length) usedWords = [];
  let available = wordBank.filter((_, i) => !usedWords.includes(i));
  let idx = wordBank.indexOf(available[Math.floor(Math.random() * available.length)]);
  usedWords.push(idx);
  return wordBank[idx];
}

// ====== 生成字母选项 ======
function generateOptions(wordObj, blanks) {
  const missing = blanks.map(i => wordObj.word[i].toUpperCase());
  const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let options = [...missing];
  // 添加干扰字母，凑够 6 个选项（最少 4 个）
  const target = Math.max(6, missing.length + 2);
  while (options.length < target) {
    const rnd = allLetters[Math.floor(Math.random() * 26)];
    if (!options.includes(rnd)) options.push(rnd);
  }
  // 打乱
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }
  return options;
}

// ====== 渲染单词 ======
function renderWord() {
  answered = false;
  hintUsed = false;
  nextBlankIdx = 0;
  blankValues = [];

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-check').disabled = true;

  currentWord = pickWord();
  const len = currentWord.word.length;
  // 挖空 1-3 个字母
  let numBlanks = Math.min(Math.max(1, Math.ceil(len * 0.35)), 3, len - 1);
  let allPos = Array.from({length: len}, (_, i) => i);
  for (let i = allPos.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allPos[i], allPos[j]] = [allPos[j], allPos[i]];
  }
  blankPositions = allPos.slice(0, numBlanks).sort((a,b) => a-b);
  blankValues = new Array(blankPositions.length).fill(null);

  // 构建字母展示
  const display = document.getElementById('word-display');
  display.innerHTML = '';
  for (let i = 0; i < len; i++) {
    const box = document.createElement('div');
    box.className = 'letter-box';
    const blankIdx = blankPositions.indexOf(i);
    if (blankIdx >= 0) {
      box.className += ' letter-blank';
      box.dataset.blankIdx = blankIdx;
      box.onclick = () => focusBlank(blankIdx);
    } else {
      box.className += ' letter-shown';
      box.textContent = currentWord.word[i].toUpperCase();
    }
    display.appendChild(box);
  }

  // 中文翻译
  document.getElementById('chinese-badge').textContent =
    (currentWord.chinese.length > 2
      ? currentWord.chinese.charAt(0) + ' ' + currentWord.chinese
      : '💬 ' + currentWord.chinese);

  // 生成选项
  optionLetters = generateOptions(currentWord, blankPositions);
  renderOptions();

  // 高亮第一个空位
  if (blankPositions.length > 0) focusBlank(0);

  updateProgressDots();
}

// ====== 渲染选项按钮 ======
function renderOptions() {
  const row = document.getElementById('options-row');
  row.innerHTML = '';
  optionLetters.forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = letter;
    btn.onclick = () => selectOption(i, letter);
    btn.dataset.optIdx = i;
    row.appendChild(btn);
  });
}

// ====== 高亮空位 ======
function focusBlank(idx) {
  if (answered) return;
  document.querySelectorAll('.letter-blank').forEach(b => b.classList.remove('active'));
  const blanks = document.querySelectorAll('.letter-blank');
  if (blanks[idx]) {
    blanks[idx].classList.add('active');
    nextBlankIdx = idx;
  }
}

// ====== 选择字母 ======
function selectOption(optIdx, letter) {
  if (answered) return;
  // 找到第一个未填的空位（从 nextBlankIdx 开始）
  let targetIdx = nextBlankIdx;
  while (targetIdx < blankValues.length && blankValues[targetIdx] !== null) {
    targetIdx++;
  }
  if (targetIdx >= blankValues.length) return; // 全填满了

  // 填入字母
  blankValues[targetIdx] = letter;
  const blanks = document.querySelectorAll('.letter-blank');
  blanks[targetIdx].classList.add('filled');
  blanks[targetIdx].textContent = letter;
  blanks[targetIdx].classList.remove('active');

  // 标记选项为已用
  document.querySelectorAll('.option-btn')[optIdx].classList.add('used');

  // 找下一个空位
  let next = targetIdx + 1;
  while (next < blankValues.length && blankValues[next] !== null) next++;
  if (next < blankValues.length) {
    focusBlank(next);
  } else {
    // 所有空位已填，启用检查按钮
    document.getElementById('btn-check').disabled = false;
  }
}

// ====== 清空 ======
function clearBlanks() {
  if (answered) return;
  blankValues = blankValues.map(() => null);
  const blanks = document.querySelectorAll('.letter-blank');
  blanks.forEach(b => {
    b.classList.remove('filled', 'correct-fill', 'wrong-fill');
    b.textContent = '';
    b.classList.add('active');
  });
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('used'));
  document.getElementById('btn-check').disabled = true;
  nextBlankIdx = 0;
  focusBlank(0);
}

// ====== 提示 ======
function showHint() {
  if (answered) return;
  hintUsed = true;
  // 在第一个未填空位自动填入正确字母
  let idx = 0;
  while (idx < blankValues.length && blankValues[idx] !== null) idx++;
  if (idx >= blankValues.length) return;

  const correctLetter = currentWord.word[blankPositions[idx]].toUpperCase();
  blankValues[idx] = correctLetter;

  const blanks = document.querySelectorAll('.letter-blank');
  blanks[idx].classList.add('filled');
  blanks[idx].textContent = correctLetter;
  blanks[idx].classList.remove('active');

  // 标记对应的选项按钮为已用
  const optBtns = document.querySelectorAll('.option-btn');
  for (const btn of optBtns) {
    if (btn.textContent === correctLetter && !btn.classList.contains('used')) {
      btn.classList.add('used');
      break;
    }
  }

  // 找下一个空位
  let next = idx + 1;
  while (next < blankValues.length && blankValues[next] !== null) next++;
  if (next < blankValues.length) {
    focusBlank(next);
  } else {
    document.getElementById('btn-check').disabled = false;
  }
}

// ====== 检查答案 ======
function checkAnswer() {
  if (answered) return;
  answered = true;
  const feedback = document.getElementById('feedback');
  const correctWord = currentWord.word.toUpperCase();

  // 构建用户填入的单词
  let userWordArr = currentWord.word.toUpperCase().split('');
  blankPositions.forEach((pos, i) => {
    userWordArr[pos] = blankValues[i] || '';
  });
  const userWord = userWordArr.join('');

  const blanks = document.querySelectorAll('.letter-blank');

  if (userWord === correctWord) {
    feedback.className = 'feedback correct';
    let bonus = hintUsed ? 5 : 10;
    if (streak >= 3) bonus += 5;
    score += bonus;
    streak++;
    wordsDone++;
    feedback.innerHTML = `🎉 太棒了！+${bonus}分<br>正确答案：<strong>${correctWord}</strong>`;

    blanks.forEach(b => b.classList.add('correct-fill'));
    document.getElementById('score').textContent = score;

    if (streak >= 2) {
      const sb = document.getElementById('streak-badge');
      sb.style.display = 'block';
      document.getElementById('streak').textContent = streak;
    }
    spawnPetals();
    showScorePopup('+' + bonus);
  } else {
    feedback.className = 'feedback wrong';
    feedback.innerHTML = `😢 再试试哦~ 正确答案：<strong>${correctWord}</strong>`;
    streak = 0;
    wordsDone++;
    document.getElementById('streak-badge').style.display = 'none';

    // 标出哪些填错了
    blankPositions.forEach((pos, i) => {
      const correct = correctWord[pos];
      if (blankValues[i] !== correct) {
        blanks[i].classList.add('wrong-fill');
        // 显示正确答案
        blanks[i].textContent = correct;
      } else {
        blanks[i].classList.add('correct-fill');
      }
    });
  }

  // 所有空位填上正确值（未填的也补上）
  blankPositions.forEach((pos, i) => {
    if (blankValues[i] === null) {
      blanks[i].textContent = correctWord[pos];
      blanks[i].classList.add('filled');
    }
  });

  // 禁用选项按钮
  document.querySelectorAll('.option-btn').forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
  document.getElementById('btn-check').disabled = true;

  updateProgressDots();

  // 延迟显示下一题按钮
  setTimeout(() => {
    if (!document.getElementById('next-btn')) {
      const ctrl = document.querySelector('.controls-row');
      const nextBtn = document.createElement('button');
      nextBtn.id = 'next-btn';
      nextBtn.className = 'btn btn-next';
      nextBtn.textContent = '🌸 下一题';
      nextBtn.onclick = nextWord;
      ctrl.appendChild(nextBtn);
    }
  }, 600);
}

// ====== 下一题 ======
function nextWord() {
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.remove();

  if (wordsDone >= totalQuestions) {
    alert('🎉 本轮完成！总分：' + score + ' 分\n继续加油哦~');
    score = 0; wordsDone = 0; streak = 0;
    document.getElementById('score').textContent = '0';
    document.getElementById('streak-badge').style.display = 'none';
    usedWords = [];
  }
  renderWord();
}

// ====== 进度圆点 ======
function updateProgressDots() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  for (let i = 0; i < totalQuestions; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i < wordsDone) dot.classList.add('done');
    if (i === wordsDone) dot.classList.add('current');
    container.appendChild(dot);
  }
}

// ====== 花瓣撒花 ======
function spawnPetals() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#f48fb1','#ce93d8','#fff176','#81c784','#90caf9','#ffab91'];
  for (let i = 0; i < 30; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal-piece';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.top = -(Math.random() * 60) + 'px';
    petal.style.width = (10 + Math.random() * 16) + 'px';
    petal.style.height = (10 + Math.random() * 16) + 'px';
    petal.style.background = colors[Math.floor(Math.random() * colors.length)];
    petal.style.animationDelay = Math.random() * 0.8 + 's';
    petal.style.animationDuration = (1.4 + Math.random() * 2) + 's';
    container.appendChild(petal);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 3000);
}

// ====== 分数弹出 ======
function showScorePopup(text) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  popup.style.left = (35 + Math.random() * 30) + '%';
  popup.style.top = '40%';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1200);
}

// 启动
updateProgressDots();
renderWord();
</script>
